services:
  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"

  migrator:
    build: .
    command: ./migrator
    environment:
      DB_DSN: "host=db user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} port=5432 sslmode=${DB_SSL_MODE}"
    depends_on:
      db:
        condition: service_started

  api:
    build: .
    ports:
      - "${API_PORT}:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      DB_DSN: "host=db user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} port=5432 sslmode=${DB_SSL_MODE}"